version: '3'
services:
  db:
    image: ankane/pgvector:latest
    container_name: chip_db
    restart: always
    environment:
      POSTGRES_DB: chip_data
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 3344520Qq
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: chip_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes

  grafana:
    image: grafana/grafana:latest
    container_name: chip_grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./grafana_data:/var/lib/grafana
    depends_on:
      - db

networks:
  default:
    name: chip_network
